<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#4A90D9">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>爱听写 · Dictation</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--surface:#fff;--text:#1a1a2e;--text2:#555;--primary:#4A90D9;
  --primary-dark:#357ABD;--accent:#50C878;--danger:#E74C3C;--border:#dde4ed;
  --radius:16px;--shadow:0 2px 12px rgba(0,0,0,.08);--font:system-ui,-apple-system,sans-serif;
  --input-bg:#f7f9fc;--tag-bg:#e8f0fe;--tag-text:#2a5db0;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f0f1a;--surface:#1a1a2e;--text:#e0e0e0;--text2:#999;
    --primary:#5ba0e8;--primary-dark:#4a90d9;--accent:#50C878;--danger:#e74c3c;
    --border:#2a2a3e;--shadow:0 2px 12px rgba(0,0,0,.4);
    --input-bg:#252540;--tag-bg:#2a2a50;--tag-text:#8ab4f8;
  }
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;-webkit-user-select:none;user-select:none}
header{
  background:var(--surface);padding:12px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;
  box-shadow:var(--shadow);z-index:10;
}
header h1{font-size:22px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
header h1 span.emoji{font-size:26px}
.header-actions{display:flex;gap:8px}
.header-actions button{
  background:var(--input-bg);border:1px solid var(--border);border-radius:10px;
  padding:8px 14px;font-size:14px;cursor:pointer;color:var(--text);
  transition:all .15s;font-family:var(--font);
}
.header-actions button:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.header-actions button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
main{flex:1;display:flex;overflow:hidden}
.sidebar{
  width:320px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
.content{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:24px 32px}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tabs button{
  flex:1;padding:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;
  background:transparent;color:var(--text2);font-family:var(--font);
  transition:all .15s;border-bottom:2px solid transparent;
}
.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-panel{flex:1;overflow-y:auto;padding:16px;display:none}
.tab-panel.active{display:flex;flex-direction:column;gap:12px}
.word-list{display:flex;flex-direction:column;gap:8px}
.word-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--input-bg);border-radius:12px;
  cursor:pointer;transition:all .15s;border:2px solid transparent;
}
.word-item:hover{border-color:var(--border)}
.word-item.selected{border-color:var(--primary);background:var(--tag-bg)}
.word-item .word-text{font-size:15px;font-weight:500}
.word-item .word-meta{font-size:12px;color:var(--text2)}
.word-item .btn-del{
  background:none;border:none;color:var(--danger);cursor:pointer;font-size:18px;
  padding:4px 8px;border-radius:8px;opacity:.6;transition:all .15s;
}
.word-item .btn-del:hover{opacity:1;background:rgba(231,76,60,.1)}
.add-form{display:flex;gap:8px}
.add-form input{
  flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:12px;
  font-size:15px;background:var(--input-bg);color:var(--text);font-family:var(--font);
  outline:none;transition:border .15s;
}
.add-form input:focus{border-color:var(--primary)}
.add-form button{
  padding:10px 18px;background:var(--primary);color:#fff;border:none;
  border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);
  transition:all .15s;
}
.add-form button:hover{background:var(--primary-dark)}
.empty-state{text-align:center;padding:32px 16px;color:var(--text2)}
.empty-state .icon{font-size:40px;margin-bottom:8px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{
  background:var(--input-bg);border-radius:12px;padding:16px;text-align:center;
}
.stat-card .num{font-size:28px;font-weight:700;color:var(--primary)}
.stat-card .label{font-size:13px;color:var(--text2);margin-top:4px}
.dictation-area{display:flex;flex-direction:column;align-items:center;gap:28px;max-width:600px;margin:0 auto;width:100%}
.mode-selector{display:flex;gap:8px}
.mode-selector button{
  padding:8px 18px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;
  font-family:var(--font);transition:all .15s;
}
.mode-selector button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.current-word{
  font-size:48px;font-weight:700;text-align:center;letter-spacing:2px;
  min-height:72px;display:flex;align-items:center;justify-content:center;
  color:var(--text);
}
.hint-area{font-size:14px;color:var(--text2);text-align:center;min-height:24px}
.play-btn{
  width:80px;height:80px;border-radius:50%;border:none;
  background:var(--primary);color:#fff;font-size:36px;cursor:pointer;
  box-shadow:0 4px 20px rgba(74,144,217,.4);transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.play-btn:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(74,144,217,.5)}
.play-btn:active{transform:scale(.95)}
.play-btn.playing{background:var(--accent)}
.speed-ctrl{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text2)}
.speed-ctrl button{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;
  font-family:var(--font);transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.speed-ctrl button:hover{background:var(--input-bg)}
.speed-val{font-weight:600;color:var(--primary);min-width:36px;text-align:center}
.input-row{display:flex;gap:12px;width:100%}
.input-row input{
  flex:1;padding:14px 18px;border:2px solid var(--border);border-radius:14px;
  font-size:20px;background:var(--input-bg);color:var(--text);font-family:var(--font);
  outline:none;transition:border .15s;text-align:center;
}
.input-row input:focus{border-color:var(--primary)}
.input-row input.correct{border-color:var(--accent);background:rgba(80,200,120,.08)}
.input-row input.wrong{border-color:var(--danger);background:rgba(231,76,60,.08)}
.input-row button{
  padding:14px 28px;background:var(--accent);color:#fff;border:none;
  border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--font);
  transition:all .15s;white-space:nowrap;
}
.input-row button:hover{opacity:.9;transform:scale(1.02)}
.result-toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;
  padding:12px 28px;border-radius:14px;font-size:16px;font-weight:600;
  color:#fff;animation:slideDown .3s ease;pointer-events:none;
}
.result-toast.correct{background:var(--accent)}
.result-toast.wrong{background:var(--danger)}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.progress-bar{
  width:100%;height:6px;background:var(--input-bg);border-radius:3px;overflow:hidden;
}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.progress-text{font-size:13px;color:var(--text2);text-align:center;margin-top:4px}
.count-selector{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text2)}
.count-selector select{
  padding:6px 12px;border:1px solid var(--border);border-radius:8px;
  font-size:14px;background:var(--surface);color:var(--text);font-family:var(--font);
  cursor:pointer;
}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:var(--input-bg);border-radius:10px;font-size:13px;
}
.history-item .date{color:var(--text2)}
.history-item .score{font-weight:600}
.history-item .score.good{color:var(--accent)}
.history-item .score.bad{color:var(--danger)}
@media(max-width:768px){
  main{flex-direction:column}
  .sidebar{width:100%;max-height:40%;border-right:none;border-bottom:1px solid var(--border)}
  .content{padding:16px}
  .current-word{font-size:36px;min-height:56px}
  .play-btn{width:64px;height:64px;font-size:28px}
  .input-row input{font-size:18px;padding:12px 16px}
}
@media(max-width:480px){
  header h1{font-size:18px}
  .content{padding:12px}
  .current-word{font-size:28px;min-height:44px}
  .input-row{flex-direction:column}
  .input-row button{width:100%}
}
</style>
</head>
<body>
<header>
  <h1><span class="emoji">🎧</span>爱听写</h1>
  <div class="header-actions">
    <button id="btnLibrary" class="active" onclick="switchTab('library')">📚 词库</button>
    <button id="btnStats" onclick="switchTab('stats')">📊 统计</button>
  </div>
</header>
<main>
  <aside class="sidebar" id="sidebarLibrary">
    <div class="tabs">
      <button class="active" onclick="switchSidebarTab('list')">词条列表</button>
      <button onclick="switchSidebarTab('add')">添加词条</button>
    </div>
    <div class="tab-panel active" id="panel-list">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--text2)">共 <strong id="wordCount">0</strong> 条</span>
        <button onclick="selectAll()" style="font-size:12px;background:none;border:none;color:var(--primary);cursor:pointer;font-family:var(--font)">全选</button>
      </div>
      <div class="word-list" id="wordList">
        <div class="empty-state"><div class="icon">📝</div><p>还没有词条<br>去添加一些吧！</p></div>
      </div>
    </div>
    <div class="tab-panel" id="panel-add">
      <div class="add-form">
        <input type="text" id="newWordInput" placeholder="输入新词条（英文/中文/拼音）" onkeydown="if(event.key==='Enter')addWord()">
        <button onclick="addWord()">添加</button>
      </div>
      <p style="font-size:12px;color:var(--text2)">支持批量导入，用逗号或换行分隔多个词条</p>
      <textarea id="bulkInput" rows="4" placeholder="或者在这里粘贴多个词条，每行一个或用逗号分隔..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:12px;font-size:14px;background:var(--input-bg);color:var(--text);font-family:var(--font);resize:vertical;margin-top:8px"></textarea>
      <button onclick="bulkAdd()" style="width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)">批量导入</button>
    </div>
  </aside>
  <aside class="sidebar" id="sidebarStats" style="display:none">
    <div style="padding:16px;display:flex;flex-direction:column;gap:16px;overflow-y:auto">
      <div class="stats-grid">
        <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">总练习次数</div></div>
        <div class="stat-card"><div class="num" id="statAvg">-</div><div class="label">平均正确率</div></div>
        <div class="stat-card"><div class="num" id="statBest">0</div><div class="label">最佳记录</div></div>
        <div class="stat-card"><div class="num" id="statWords">0</div><div class="label">词库数量</div></div>
      </div>
      <h3 style="font-size:15px">最近记录</h3>
      <div class="history-list" id="historyList">
        <div class="empty-state" style="padding:20px"><div class="icon">📋</div><p>还没有练习记录</p></div>
      </div>
      <button onclick="clearHistory()" style="padding:8px;background:transparent;border:1px solid var(--danger);color:var(--danger);border-radius:10px;cursor:pointer;font-family:var(--font);font-size:13px">清除记录</button>
    </div>
  </aside>
  <section class="content">
    <div class="dictation-area">
      <div class="mode-selector">
        <button class="active" onclick="setMode('word')">单词模式</button>
        <button onclick="setMode('phrase')">短语模式</button>
        <button onclick="setMode('random')">随机模式</button>
      </div>
      <div class="current-word" id="currentWordDisplay"></div>
      <div class="hint-area" id="hintArea"></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">准备开始</div>
      <button class="play-btn" id="playBtn" onclick="playAudio()">▶</button>
      <div class="speed-ctrl">
        <button onclick="changeSpeed(-0.1)">−</button>
        <span>语速</span><span class="speed-val" id="speedVal">1.0x</span>
        <button onclick="changeSpeed(0.1)">+</button>
      </div>
      <div class="count-selector">
        <span>练习数量</span>
        <select id="countSelect" onchange="prepareSession()">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
          <option value="0">全部</option>
        </select>
      </div>
      <div class="input-row">
        <input type="text" id="answerInput" placeholder="输入你听到的内容..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkAnswer()">
        <button onclick="checkAnswer()">✓ 检查</button>
      </div>
    </div>
  </section>
</main>

function saveWords(){localStorage.setItem('dictation_words',JSON.stringify(words))}
function saveHistory(){localStorage.setItem('dictation_history',JSON.stringify(history))}

function renderWordList(){
  var el=document.getElementById('wordList');
  document.getElementById('wordCount').textContent=words.length;
  if(words.length===0){el.innerHTML='<div class="empty-state"><div class="icon">📝</div><p>还没有词条<br>去添加一些吧！</p></div>';return}
  el.innerHTML=words.map(function(w,i){
    return '<div class="word-item" onclick="toggleWord('+i+')" id="word-'+i+'"><span class="word-text">'+escHtml(w)+'</span><button class="btn-del" onclick="event.stopPropagation();deleteWord('+i+')" title="删除">&times;</button></div>';
  }).join('');
}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function addWord(){
  var inp=document.getElementById('newWordInput');
  var val=inp.value.trim();
  if(!val)return;
  words.push(val);
  saveWords();
  renderWordList();
  updateStats();
  inp.value='';
  inp.focus();
  prepareSession();
}
function bulkAdd(){
  var val=document.getElementById('bulkInput').value.trim();
  if(!val)return;
  var newWords=val.split(/[,
]+/).map(function(s){return s.trim()}).filter(function(s){return s.length>0});
  words.push.apply(words,newWords);
  saveWords();
  renderWordList();
  updateStats();
  document.getElementById('bulkInput').value='';
  prepareSession();
}
function deleteWord(i){words.splice(i,1);saveWords();renderWordList();updateStats();prepareSession()}
function toggleWord(i){
  var el=document.getElementById('word-'+i);
  if(!el)return;
  el.classList.toggle('selected');
}

function prepareSession(){
  var pool=words.slice();
  if(pool.length===0)return;
  shuffle(pool);
  var count=parseInt(document.getElementById('countSelect').value);
  currentSession=count>0?pool.slice(0,count):pool;
  currentIndex=-1;
  score=0;
  total=0;
  updateProgress();
  document.getElementById('currentWordDisplay').textContent='';
  document.getElementById('hintArea').textContent='';
  document.getElementById('answerInput').value='';
  document.getElementById('answerInput').className='';
  document.getElementById('progressText').textContent='共 '+currentSession.length+' 题';
  document.getElementById('playBtn').textContent='▶';
  document.getElementById('playBtn').classList.remove('playing');
  nextWord();
}
function nextWord(){
  currentIndex++;
  if(currentIndex>=currentSession.length){
    finishSession();
    return;
  }
  currentWord=currentSession[currentIndex];
  document.getElementById('currentWordDisplay').textContent='•••';
  document.getElementById('hintArea').textContent=mode==='phrase'?currentWord.length+' 个字符':'';
  document.getElementById('answerInput').value='';
  document.getElementById('answerInput').className='';
  document.getElementById('answerInput').focus();
  updateProgress();
  setTimeout(function(){playAudio()},300);
}
function updateProgress(){
  var pct=currentIndex>=0?Math.round((currentIndex/currentSession.length)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=(currentIndex+1)+'/'+currentSession.length;
}
function finishSession(){
  var pct=total>0?Math.round((score/total)*100):0;
  document.getElementById('currentWordDisplay').textContent=pct>=80?'🎉 '+pct+'%':'💪 '+pct+'%';
  document.getElementById('hintArea').textContent='正确 '+score+'/'+total;
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressText').textContent='完成！';
  document.getElementById('playBtn').textContent='↻';
  document.getElementById('playBtn').classList.remove('playing');
  history.unshift({date:new Date().toISOString(),score:score,total:total,pct:pct});
  if(history.length>50)history.length=50;
  saveHistory();
  renderHistory();
  updateStats();
  showToast(pct>=60?'correct':'wrong',pct>=80?'太棒了！正确率 '+pct+'%':'正确率 '+pct+'%，继续加油！');
}

function playAudio(){
  if(isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;document.getElementById('playBtn').classList.remove('playing');document.getElementById('playBtn').textContent='▶';return}
  if(!currentWord||currentIndex<0||currentIndex>=currentSession.length){
    if(currentSession.length>0)prepareSession();
    return;
  }
  var utterance=new SpeechSynthesisUtterance(currentWord);
  utterance.rate=speed;
  utterance.lang='en-US';
  if(/[\u4e00-\u9fff]/.test(currentWord))utterance.lang='zh-CN';
  utterance.onstart=function(){isSpeaking=true;document.getElementById('playBtn').classList.add('playing');document.getElementById('playBtn').textContent='⏸'};
  utterance.onend=function(){isSpeaking=false;document.getElementById('playBtn').classList.remove('playing');document.getElementById('playBtn').textContent='▶'};
  utterance.onerror=function(){isSpeaking=false;document.getElementById('playBtn').classList.remove('playing');document.getElementById('playBtn').textContent='▶'};
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utterance);
}
function changeSpeed(delta){
  speed=Math.round((speed+delta)*10)/10;
  if(speed<0.3)speed=0.3;
  if(speed>2.5)speed=2.5;
  updateSpeedDisplay();
}
function updateSpeedDisplay(){document.getElementById('speedVal').textContent=speed.toFixed(1)+'x'}

function checkAnswer(){
  if(!currentWord||currentIndex<0||currentIndex>=currentSession.length)return;
  var inp=document.getElementById('answerInput');
  var answer=inp.value.trim();
  if(!answer)return;
  total++;
  var isCorrect=answer.toLowerCase()===currentWord.toLowerCase();
  if(isCorrect){
    score++;
    inp.className='correct';
    showToast('correct','✓ 正确！');
  }else{
    inp.className='wrong';
    document.getElementById('hintArea').textContent='正确答案: '+currentWord;
    showToast('wrong','正确答案: '+currentWord);
  }
  setTimeout(function(){nextWord()},isCorrect?600:1500);
}
function showToast(type,msg){
  var existing=document.querySelector('.result-toast');
  if(existing)existing.remove();
  var el=document.createElement('div');
  el.className='result-toast '+type;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){el.remove()},type==='correct'?1200:2000);
}

function switchTab(tab){
  document.getElementById('btnLibrary').classList.toggle('active',tab==='library');
  document.getElementById('btnStats').classList.toggle('active',tab==='stats');
  document.getElementById('sidebarLibrary').style.display=tab==='library'?'flex':'none';
  document.getElementById('sidebarStats').style.display=tab==='stats'?'flex':'none';
}
function switchSidebarTab(tab){
  var tabs=document.querySelectorAll('.sidebar .tabs button');
  tabs[0].classList.toggle('active',tab==='list');
  tabs[1].classList.toggle('active',tab==='add');
  document.getElementById('panel-list').classList.toggle('active',tab==='list');
  document.getElementById('panel-add').classList.toggle('active',tab==='add');
}
function setMode(m){
  mode=m;
  var labels={word:'单词',phrase:'短语',random:'随机'};
  var buttons=document.querySelectorAll('.mode-selector button');
  for(var i=0;i<buttons.length;i++){
    buttons[i].classList.toggle('active',buttons[i].textContent.indexOf(labels[m])!==-1);
  }
  prepareSession();
}
function selectAll(){
  var items=document.querySelectorAll('.word-item');
  var allSelected=document.querySelectorAll('.word-item.selected').length===items.length;
  for(var i=0;i<items.length;i++){
    items[i].classList.toggle('selected',!allSelected);
  }
}

function renderHistory(){
  var el=document.getElementById('historyList');
  if(history.length===0){el.innerHTML='<div class="empty-state" style="padding:20px"><div class="icon">📋</div><p>还没有练习记录</p></div>';return}
  el.innerHTML=history.slice(0,20).map(function(h){
    var d=new Date(h.date);
    var ds=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    var cls=h.pct>=60?'good':'bad';
    return '<div class="history-item"><span class="date">'+ds+'</span><span class="score '+cls+'">'+h.score+'/'+h.total+' ('+h.pct+'%)</span></div>';
  }).join('');
}
function updateStats(){
  document.getElementById('statTotal').textContent=history.length;
  document.getElementById('statWords').textContent=words.length;
  if(history.length>0){
    var avg=Math.round(history.reduce(function(s,h){return s+h.pct},0)/history.length);
    document.getElementById('statAvg').textContent=avg+'%';
    var best=Math.max.apply(null,history.map(function(h){return h.pct}));
    document.getElementById('statBest').textContent=best+'%';
  }
}
function clearHistory(){
  if(confirm('确定清除所有练习记录？')){history=[];saveHistory();renderHistory();updateStats()}
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}}

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();playAudio()}
});

init();
</script>
</body>
</html>
